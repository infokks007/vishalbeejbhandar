<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Cart — Vishal Beej Bhandar</title>
  <link rel="icon" href="images/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .cart-layout { display: grid; grid-template-columns: 1fr 360px; gap: 30px; align-items: start; }
    .cart-item { display: flex; gap: 16px; padding: 16px; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 14px; background: var(--bg-card); align-items: center; }
    .cart-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; }
    .ci-info { flex: 1; }
    .ci-info h4 { font-size: 1rem; margin-bottom: 4px; }
    .ci-info .unit { color: var(--text-soft); font-size: .82rem; }
    .ci-qty { display: flex; align-items: center; border: 1px solid var(--border); border-radius: 30px; }
    .ci-qty button { width: 32px; height: 34px; border: none; background: none; color: var(--text); cursor: pointer; }
    .ci-qty span { width: 34px; text-align: center; }
    .ci-price { font-weight: 700; color: var(--green-700); min-width: 80px; text-align: right; }
    [data-theme="dark"] .ci-price { color: var(--olive-light); }
    .ci-remove { background: none; border: none; color: var(--pink-600); cursor: pointer; font-size: 1rem; }
    .summary { position: sticky; top: 90px; }
    .sum-row { display: flex; justify-content: space-between; padding: 8px 0; color: var(--text-soft); }
    .sum-total { display: flex; justify-content: space-between; padding: 14px 0; border-top: 1px solid var(--border); margin-top: 10px; font-size: 1.2rem; font-weight: 700; color: var(--text); }
    @media (max-width: 760px) { .cart-layout { grid-template-columns: 1fr; } .summary { position: static; } }
    .coupon-section { margin-top: 18px; border-top: 1px solid var(--border); padding-top: 16px; }
    .coupon-input-wrap { display: flex; gap: 8px; }
    .coupon-input-wrap input { flex: 1; padding: 10px 14px; border: 2px dashed var(--border); border-radius: 10px; font-family: 'Inter',monospace; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; font-size: .9rem; background: var(--bg); color: var(--text); outline: none; transition: border-color .2s; }
    .coupon-input-wrap input:focus { border-color: var(--primary); }
    .coupon-input-wrap input::placeholder { text-transform: none; letter-spacing: 0; font-weight: 400; color: var(--text-soft); font-size: .85rem; }
    .coupon-applied { display: flex; align-items: center; gap: 10px; background: linear-gradient(135deg, rgba(79,158,87,.08), rgba(79,158,87,.02)); border: 1px solid rgba(79,158,87,.3); border-radius: 10px; padding: 10px 14px; margin-top: 10px; animation: fadeIn .3s; }
    .coupon-applied .coupon-tag { background: var(--grad-main); color: #fff; padding: 3px 10px; border-radius: 20px; font-size: .78rem; font-weight: 700; letter-spacing: 1px; }
    .coupon-applied .coupon-saving { flex: 1; font-size: .88rem; color: var(--green-700); font-weight: 600; }
    [data-theme="dark"] .coupon-applied .coupon-saving { color: var(--olive-light); }
    .coupon-applied .coupon-remove { background: none; border: none; color: var(--pink-600); cursor: pointer; font-size: .9rem; padding: 4px; }
    .coupon-error { color: #c62828; font-size: .82rem; margin-top: 6px; display: none; }
    .sum-discount { color: var(--green-600); font-weight: 600; }
  </style>
</head>
<body>
  <div id="header-holder"></div>

  <section class="page-hero">
    <div class="container">
      <div class="breadcrumb"><a href="index.html">Home</a> / <span>Cart</span></div>
      <h1>My <span class="gradient-text">Cart</span></h1>
    </div>
  </section>

  <section class="section" style="padding-top:40px">
    <div class="container">
      <div id="cart-body"></div>
    </div>
  </section>

  <!-- Checkout modal -->
  <div class="modal-overlay" id="checkout-modal">
    <div class="modal">
      <button class="modal-close" onclick="closeModal('checkout-modal')">&times;</button>
      <h3 style="margin-bottom:6px">Place Order</h3>
      <p style="color:var(--text-soft);font-size:.88rem;margin-bottom:18px">Fill your details — your order is sent to us via WhatsApp & saved for our team.</p>
      <form id="checkout-form">
        <div class="form-group"><label>Full Name</label><input id="co-name" required></div>
        <div class="form-group"><label>Phone</label><input id="co-phone" required></div>
        <div class="form-group"><label>Email</label><input type="email" id="co-email"></div>
        <div class="form-group"><label>Delivery Address</label><textarea id="co-address" required></textarea></div>
        <button class="btn btn-primary btn-block" type="submit"><i class="fa-brands fa-whatsapp"></i> Confirm & Send Order</button>
      </form>
    </div>
  </div>

  <div id="footer-holder"></div>
  <script src="js/app.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
