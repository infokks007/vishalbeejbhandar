<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — Vishal Beej Bhandar</title>
  <link rel="icon" href="images/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .pd-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; align-items: start; }
    .pd-gallery { position: sticky; top: 90px; }
    .pd-main-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: var(--radius); background: var(--grad-soft); border: 1px solid var(--border); }
    .pd-brand { color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; font-size: .85rem; }
    .pd-title { font-size: 2.1rem; margin: 8px 0 12px; }
    .pd-rating { color: #f5a623; margin-bottom: 16px; }
    .pd-rating span { color: var(--text-soft); font-size: .9rem; }
    .pd-price { display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px; }
    .pd-price .now { font-size: 2rem; font-weight: 800; color: var(--green-700); font-family: 'Poppins'; }
    [data-theme="dark"] .pd-price .now { color: var(--olive-light); }
    .pd-price .was { font-size: 1.1rem; color: var(--text-soft); text-decoration: line-through; }
    .pd-price .off { background: var(--pink-200); color: var(--pink-600); padding: 4px 10px; border-radius: 20px; font-size: .82rem; font-weight: 700; }
    [data-theme="dark"] .pd-price .off { background: rgba(232,93,146,.2); }
    .pd-stock { font-size: .9rem; margin-bottom: 20px; }
    .in-stock { color: var(--green-600); } .out-stock { color: var(--pink-600); }
    .pd-short { color: var(--text-soft); margin-bottom: 22px; line-height: 1.7; }
    .pd-specs { list-style: none; margin: 0 0 24px; }
    .pd-specs li { padding: 8px 0; border-bottom: 1px dashed var(--border); display: flex; gap: 10px; }
    .pd-specs li i { color: var(--primary); margin-top: 4px; }
    .qty-row { display: flex; align-items: center; gap: 16px; margin-bottom: 22px; }
    .qty-ctrl { display: flex; align-items: center; border: 1px solid var(--border); border-radius: 50px; overflow: hidden; }
    .qty-ctrl button { width: 40px; height: 44px; border: none; background: var(--surface); color: var(--text); font-size: 1.1rem; cursor: pointer; }
    .qty-ctrl button:hover { color: var(--primary); }
    .qty-ctrl span { width: 48px; text-align: center; font-weight: 600; }
    .pd-actions { display: flex; gap: 12px; flex-wrap: wrap; }
    .pd-meta { margin-top: 26px; display: flex; gap: 22px; flex-wrap: wrap; padding-top: 22px; border-top: 1px solid var(--border); }
    .pd-meta-item { font-size: .85rem; color: var(--text-soft); display: flex; align-items: center; gap: 8px; }
    .pd-meta-item i { color: var(--primary); }
    .pd-tabs { margin-top: 60px; }
    .tab-content { padding: 24px 0; color: var(--text-soft); line-height: 1.8; }
    @media (max-width: 820px) { .pd-wrap { grid-template-columns: 1fr; gap: 28px; } .pd-gallery { position: static; } }
  </style>
</head>
<body>
  <div id="header-holder"></div>

  <section class="section" style="padding-top:30px">
    <div class="container">
      <div class="breadcrumb" id="breadcrumb"><a href="index.html">Home</a> / <a href="products.html">Products</a> / <span>...</span></div>
      <div id="product-content"><div class="spinner"></div></div>

      <!-- Related -->
      <div id="related-section" style="margin-top:70px;display:none">
        <div class="section-head" style="margin-bottom:30px"><h2>You may also <span class="gradient-text">like</span></h2></div>
        <div class="product-grid" id="related-grid"></div>
      </div>
    </div>
  </section>

  <div id="footer-holder"></div>
  <script src="js/app.js"></script>
  <script src="js/product.js"></script>
</body>
</html>
